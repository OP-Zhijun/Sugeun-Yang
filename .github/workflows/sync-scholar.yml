name: Sync Google Scholar metrics

on:
  schedule:
    # Every Monday at 09:00 UTC (~18:00 KST)
    - cron: '0 9 * * MON'
  workflow_dispatch:  # allow manual run from Actions tab or `gh workflow run`

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Both scripts use only stdlib (no pip install needed).
      - name: Sync OpenAlex network
        run: python scripts/sync_network.py

      - name: Sync Scholar metrics (via SerpAPI)
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/sync_scholar.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes — Scholar metrics unchanged or fetch failed."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "Auto-sync Scholar metrics (${DATE})"
            git push
            echo "Committed updated metrics."
          fi
